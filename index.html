<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health Tracker — Let's Thrive</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  input[type=range] { accent-color: #7c3aed; }
  .tab-active { border-bottom: 2px solid #7c3aed; color: #7c3aed; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #7c3aed !important; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Paste your deployed Apps Script URL here (or set via Settings in the app)
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzXNh6ZRyG3GE6eMUSFcxC5IhVvO1J7618LrXPQMdfBLQJTh9JNoVMB5bInXZA64Ig/exec";
const STORAGE = {
  TOKEN:   "ht_token",
  NAME:    "ht_name",
  COACH:   "ht_coach",
  API_URL: "ht_api_url",
};

// ─── HABIT TEMPLATES ─────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  "Ήπια 8+ ποτήρια νερό",
  "Έκανα κίνηση / άσκηση",
  "Κοιμήθηκα 7–8 ώρες",
  "Έφαγα πρωινό",
  "Δεν έφαγα αργά τη νύχτα",
  "Χωρίς ζάχαρη / γλυκά",
  "Ενσυνείδητη κατανάλωση (χωρίς οθόνη)",
  "Έλαβα τα συμπληρώματά μου",
];

// ─── FOOD FREQUENCY CATEGORIES ────────────────────────────────────────────────
const FOOD_FREQ_CATS = [
  { id:"veg",    label:"🥦 Λαχανικά",          hint:"σαλάτες, μαγειρευτά" },
  { id:"fruit",  label:"🍎 Φρούτα",             hint:"φρέσκα ή κατεψυγμένα" },
  { id:"grains", label:"🌾 Δημητριακά / ψωμί",  hint:"ρύζι, ζυμαρικά, ψωμί" },
  { id:"prot",   label:"🍗 Πρωτεΐνες",          hint:"κρέας, ψάρι, αυγά, τόνος" },
  { id:"dairy",  label:"🥛 Γαλακτοκομικά",      hint:"γιαούρτι, τυρί, γάλα" },
  { id:"legum",  label:"🫘 Όσπρια",             hint:"φακές, ρεβίθια, φασόλια" },
  { id:"fats",   label:"🫒 Καλά λίπη",          hint:"ελαιόλαδο, ξηροί καρποί, αβοκάντο" },
  { id:"sweet",  label:"🍰 Γλυκά / επεξεργασμένα", hint:"μπισκότα, αναψυκτικά, fast food" },
  { id:"coffee", label:"☕ Καφές",              hint:"εσπρέσο, φραπέ, τσάι" },
  { id:"alc",    label:"🍷 Αλκοόλ",             hint:"κρασί, μπύρα, ποτό" },
];

const FREQ_OPTIONS = ["0","1","2","3","4","5","6","7+"];
const HUNGER_LABELS = {1:"Λιμασμένη",3:"Αρκετά πεινασμένη",5:"Ουδέτερη",7:"Σχεδόν χορτάτη",10:"Πολύ χορτάτη"};
const EMOTIONS_OPTIONS = ["Ήρεμη","Άγχος","Κούραση","Χαρά","Λύπη","Βαρεμάρα","Επιβράβευση","Κοινωνική πίεση","Άλλο"];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split("T")[0];
const fmtDate = d => {
  const [y,m,day] = d.split("-");
  const months = ["Ιαν","Φεβ","Μαρ","Απρ","Μαΐ","Ιουν","Ιουλ","Αυγ","Σεπ","Οκτ","Νοε","Δεκ"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
};
const weekStart = d => {
  const dt = new Date(d); const day = dt.getDay();
  const diff = day===0 ? -6 : 1-day;
  dt.setDate(dt.getDate()+diff);
  return dt.toISOString().split("T")[0];
};
const ls = { get:(k)=>{ try{return localStorage.getItem(k);}catch{return null;} }, set:(k,v)=>{ try{localStorage.setItem(k,v);}catch{} }, del:(k)=>{ try{localStorage.removeItem(k);}catch{} } };

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(action, params={}, method="GET") {
  const base = ls.get(STORAGE.API_URL) || DEFAULT_API_URL;
  if (!base) throw new Error("Δεν έχει οριστεί το API URL. Πήγαινε στις Ρυθμίσεις.");
  if (method === "GET") {
    const qs = new URLSearchParams({ action, ...params }).toString();
    const r = await fetch(`${base}?${qs}`);
    const j = await r.json();
    if (!j.success) throw new Error(j.error || "Σφάλμα");
    return j.data;
  } else {
    const r = await fetch(base, { method:"POST", body: JSON.stringify({ action, ...params }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error || "Σφάλμα");
    return j.data;
  }
}

// ─── SMALL UI ─────────────────────────────────────────────────────────────────
function Spinner() {
  return <div className="w-5 h-5 border-2 border-violet-300 border-t-violet-600 rounded-full spin" />;
}
function Btn({children, onClick, disabled, variant="primary", size="md", className=""}) {
  const base = "font-semibold rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2";
  const sz = size==="sm" ? "px-3 py-1.5 text-sm" : size==="lg" ? "px-6 py-3.5 text-base" : "px-4 py-2.5 text-sm";
  const v = variant==="primary" ? "bg-violet-600 hover:bg-violet-700 text-white shadow-sm" :
            variant==="outline" ? "border border-gray-200 bg-white text-gray-700 hover:bg-gray-50" :
            variant==="ghost"   ? "text-gray-500 hover:bg-gray-100" :
            variant==="danger"  ? "bg-red-500 hover:bg-red-600 text-white" : "";
  return <button onClick={onClick} disabled={disabled} className={`${base} ${sz} ${v} ${disabled?"opacity-50 cursor-not-allowed":""} ${className}`}>{children}</button>;
}
function Card({children, className=""}) {
  return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>;
}
function Toast({msg, type="success", onClose}) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); },[]);
  const color = type==="success"?"bg-emerald-600":type==="error"?"bg-red-500":"bg-violet-600";
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 ${color} text-white px-5 py-3 rounded-2xl shadow-xl text-sm font-medium fade-in max-w-xs text-center`}>{msg}</div>;
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({ onBack }) {
  const [url, setUrl] = useState(ls.get(STORAGE.API_URL)||"");
  const [saved, setSaved] = useState(false);
  const save = () => { ls.set(STORAGE.API_URL, url.trim()); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  const logout = () => { [STORAGE.TOKEN,STORAGE.NAME,STORAGE.COACH].forEach(k=>ls.del(k)); window.location.reload(); };
  return (
    <div className="fade-in space-y-4">
      <div className="flex items-center gap-3 mb-2">
        <button onClick={onBack} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500">←</button>
        <h2 className="font-bold text-gray-800">Ρυθμίσεις</h2>
      </div>
      <Card className="p-4 space-y-3">
        <p className="text-sm font-semibold text-gray-700">Google Apps Script URL</p>
        <p className="text-xs text-gray-400">Το URL που πήρες όταν έκανες Deploy → Web App στο Google Apps Script.</p>
        <textarea value={url} onChange={e=>setUrl(e.target.value)} rows={3}
          placeholder="https://script.google.com/macros/s/..."
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none" />
        <Btn onClick={save} className="w-full">{saved ? "✓ Αποθηκεύτηκε!" : "Αποθήκευση"}</Btn>
      </Card>
      <Card className="p-4">
        <p className="text-sm font-semibold text-gray-700 mb-2">Λογαριασμός</p>
        <Btn onClick={logout} variant="danger" className="w-full">Αποσύνδεση</Btn>
      </Card>
    </div>
  );
}

// ─── LOGIN VIEW ───────────────────────────────────────────────────────────────
function LoginView({ onLogin }) {
  const [mode, setMode] = useState("client");
  const [token, setToken] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showSettings, setShowSettings] = useState(false);

  if (showSettings) return <SettingsView onBack={()=>setShowSettings(false)} />;

  const loginClient = async () => {
    if (!token.trim()) return setError("Εισήγαγε το token σου");
    setLoading(true); setError("");
    try {
      const data = await api("getClient", { token: token.trim() });
      ls.set(STORAGE.TOKEN, token.trim());
      ls.set(STORAGE.NAME, data.name);
      onLogin({ type:"client", token: token.trim(), name: data.name });
    } catch(e) { setError(e.message); }
    setLoading(false);
  };
  const loginCoach = async () => {
    if (!pass.trim()) return setError("Εισήγαγε τον κωδικό");
    setLoading(true); setError("");
    try {
      await api("coachAuth", { password: pass.trim() }, "POST");
      ls.set(STORAGE.COACH, pass.trim());
      onLogin({ type:"coach", password: pass.trim() });
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-5 bg-gradient-to-br from-violet-50 to-fuchsia-50">
      <div className="w-full max-w-sm space-y-6">
        {/* Logo */}
        <div className="text-center space-y-1">
          <div className="text-4xl">🌿</div>
          <h1 className="text-2xl font-bold text-gray-800">Health Tracker</h1>
          <p className="text-sm text-gray-400">Let's Thrive for Life</p>
        </div>

        {/* Mode toggle */}
        <div className="flex bg-white rounded-xl p-1 border border-gray-100 shadow-sm">
          {[["client","Πελάτης"],["coach","Coach"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setMode(v);setError("");}}
              className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${mode===v?"bg-violet-600 text-white shadow":"text-gray-500"}`}>{l}</button>
          ))}
        </div>

        <Card className="p-5 space-y-4">
          {mode==="client" ? (
            <>
              <div>
                <label className="text-xs text-gray-500 font-medium mb-1 block">Token Πρόσβασης</label>
                <input value={token} onChange={e=>setToken(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginClient()}
                  placeholder="Π.χ. a3f9b2c1d4e5f6a7"
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm" />
                <p className="text-xs text-gray-400 mt-1.5">Το token σου στο έδωσε η διαιτολόγος σου.</p>
              </div>
              {error && <p className="text-sm text-red-500 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
              <Btn onClick={loginClient} disabled={loading} size="lg" className="w-full">
                {loading ? <Spinner/> : "Είσοδος"}
              </Btn>
            </>
          ) : (
            <>
              <div>
                <label className="text-xs text-gray-500 font-medium mb-1 block">Κωδικός Coach</label>
                <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginCoach()}
                  placeholder="••••••••"
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm" />
              </div>
              {error && <p className="text-sm text-red-500 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
              <Btn onClick={loginCoach} disabled={loading} size="lg" className="w-full">
                {loading ? <Spinner/> : "Είσοδος Coach"}
              </Btn>
            </>
          )}
        </Card>

        <button onClick={()=>setShowSettings(true)} className="mx-auto flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-600 transition-colors">
          ⚙ Ρυθμίσεις API
        </button>
      </div>
    </div>
  );
}

// ─── HABIT TRACKER ────────────────────────────────────────────────────────────
function HabitTab({ token, date, initialData, onSave }) {
  const [habits, setHabits] = useState(() => {
    if (initialData?.length) return initialData.map(h=>({ habit:h.habit, done: h.done==="TRUE"||h.done===true }));
    return DEFAULT_HABITS.map(h=>({ habit:h, done:false }));
  });
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  const toggle = i => setHabits(p=>p.map((h,idx)=>idx===i?{...h,done:!h.done}:h));
  const done = habits.filter(h=>h.done).length;
  const pct = Math.round(done/habits.length*100);

  const save = async () => {
    setSaving(true);
    try {
      await api("saveHabits", { token, date, habits }, "POST");
      setToast("Αποθηκεύτηκε! ✓");
      onSave && onSave();
    } catch(e) { setToast("Σφάλμα: "+e.message); }
    setSaving(false);
  };

  return (
    <div className="space-y-4 fade-in">
      {toast && <Toast msg={toast} type={toast.includes("Σφάλμα")?"error":"success"} onClose={()=>setToast(null)} />}

      {/* Progress */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-2">
          <p className="text-sm font-semibold text-gray-700">Πρόοδος σήμερα</p>
          <p className="text-sm font-bold text-violet-600">{done}/{habits.length}</p>
        </div>
        <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-full transition-all duration-500"
            style={{width:`${pct}%`}} />
        </div>
        <p className="text-xs text-gray-400 mt-1.5">
          {pct===100 ? "🎉 Τέλεια! Όλες οι συνήθειες για σήμερα!" : pct>=60 ? "💪 Πολύ καλή πρόοδος!" : pct>=30 ? "🌱 Συνέχισε έτσι!" : "Ξεκίνα σήμερα — κάθε βήμα μετράει!"}
        </p>
      </Card>

      {/* Habit list */}
      <Card className="divide-y divide-gray-50">
        {habits.map((h,i) => (
          <button key={i} onClick={()=>toggle(i)}
            className="w-full flex items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-gray-50 active:bg-gray-100">
            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all
              ${h.done ? "bg-violet-600 border-violet-600" : "border-gray-300"}`}>
              {h.done && <span className="text-white text-xs">✓</span>}
            </div>
            <p className={`text-sm ${h.done?"text-gray-400 line-through":"text-gray-700"}`}>{h.habit}</p>
          </button>
        ))}
      </Card>

      <Btn onClick={save} disabled={saving} className="w-full" size="lg">
        {saving ? <><Spinner/>Αποθήκευση...</> : "Αποθήκευση Habits"}
      </Btn>
    </div>
  );
}

// ─── FOOD LOG ─────────────────────────────────────────────────────────────────
const EMPTY_ENTRY = () => ({ time:"", food:"", portion:"", energyCal:"", hungerScore:5, emotions:[] });

function FoodLogTab({ token, date, initialData, onSave }) {
  const [entries, setEntries] = useState(()=>
    initialData?.length ? initialData.map(e=>({...e, hungerScore:parseInt(e.hungerScore)||5, emotions:typeof e.emotions==="string"&&e.emotions?e.emotions.split("|"):[]}))
    : [EMPTY_ENTRY()]
  );
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [activeIdx, setActiveIdx] = useState(0);

  const upd = (i,k,v) => setEntries(p=>p.map((e,idx)=>idx===i?{...e,[k]:v}:e));
  const addEntry = () => { setEntries(p=>[...p, EMPTY_ENTRY()]); setActiveIdx(entries.length); };
  const delEntry = i => { setEntries(p=>p.filter((_,idx)=>idx!==i)); setActiveIdx(Math.max(0,activeIdx-1)); };
  const toggleEmotion = (i,em) => {
    setEntries(p=>p.map((e,idx)=>idx!==i?e:{...e,emotions:e.emotions.includes(em)?e.emotions.filter(x=>x!==em):[...e.emotions,em]}));
  };

  const save = async () => {
    setSaving(true);
    try {
      const payload = entries.map(e=>({...e, emotions:Array.isArray(e.emotions)?e.emotions.join("|"):e.emotions}));
      await api("saveFoodLog", { token, date, entries:payload }, "POST");
      setToast("Αποθηκεύτηκε! ✓");
      onSave && onSave();
    } catch(e) { setToast("Σφάλμα: "+e.message); }
    setSaving(false);
  };

  return (
    <div className="space-y-4 fade-in">
      {toast && <Toast msg={toast} type={toast.includes("Σφάλμα")?"error":"success"} onClose={()=>setToast(null)} />}

      {/* Entry tabs */}
      <div className="flex gap-2 overflow-x-auto pb-1">
        {entries.map((_,i)=>(
          <button key={i} onClick={()=>setActiveIdx(i)}
            className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-medium transition-colors
              ${activeIdx===i?"bg-violet-600 text-white":"bg-white border border-gray-200 text-gray-500"}`}>
            Γεύμα {i+1}
          </button>
        ))}
        <button onClick={addEntry} className="flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-medium bg-white border border-dashed border-gray-300 text-gray-400 hover:border-violet-300 hover:text-violet-500">
          + Προσθήκη
        </button>
      </div>

      {entries.map((e,i)=>i!==activeIdx?null:(
        <Card key={i} className="p-4 space-y-4 fade-in">
          <div className="flex justify-between items-center">
            <p className="text-sm font-semibold text-gray-700">Γεύμα {i+1}</p>
            {entries.length>1 && <button onClick={()=>delEntry(i)} className="text-red-400 hover:text-red-600 text-xs">Διαγραφή</button>}
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-gray-400 mb-1 block">Ώρα</label>
              <input type="time" value={e.time} onChange={ev=>upd(i,"time",ev.target.value)}
                className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
            </div>
            <div>
              <label className="text-xs text-gray-400 mb-1 block">Μερίδα</label>
              <input value={e.portion} onChange={ev=>upd(i,"portion",ev.target.value)} placeholder="π.χ. 1 μεσαία"
                className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
            </div>
          </div>

          <div>
            <label className="text-xs text-gray-400 mb-1 block">Τι έφαγα / ήπια</label>
            <textarea value={e.food} onChange={ev=>upd(i,"food",ev.target.value)} rows={2}
              placeholder="Π.χ. κοτόπουλο με ρύζι και σαλάτα..."
              className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none" />
          </div>

          <div>
            <label className="text-xs text-gray-400 mb-1 block">Θερμίδες (προαιρετικό)</label>
            <input type="number" value={e.energyCal} onChange={ev=>upd(i,"energyCal",ev.target.value)} placeholder="kcal"
              className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
          </div>

          {/* Hunger scale */}
          <div>
            <div className="flex justify-between items-center mb-2">
              <label className="text-xs text-gray-400">Επίπεδο πείνας / κορεσμού</label>
              <span className="text-xs font-semibold text-violet-600">{e.hungerScore}/10 — {HUNGER_LABELS[e.hungerScore]||""}</span>
            </div>
            <input type="range" min="1" max="10" value={e.hungerScore} onChange={ev=>upd(i,"hungerScore",parseInt(ev.target.value))}
              className="w-full h-2 rounded-full" />
            <div className="flex justify-between text-xs text-gray-300 mt-1">
              <span>Λιμασμένη</span><span>Χορτάτη</span>
            </div>
          </div>

          {/* Emotions */}
          <div>
            <label className="text-xs text-gray-400 mb-2 block">Συναισθήματα πριν / κατά το φαγητό</label>
            <div className="flex flex-wrap gap-1.5">
              {EMOTIONS_OPTIONS.map(em=>(
                <button key={em} onClick={()=>toggleEmotion(i,em)}
                  className={`px-2.5 py-1 rounded-full text-xs font-medium transition-colors
                    ${e.emotions.includes(em)?"bg-violet-100 text-violet-700 border border-violet-200":"bg-gray-100 text-gray-500"}`}>
                  {em}
                </button>
              ))}
            </div>
          </div>
        </Card>
      ))}

      <Btn onClick={save} disabled={saving} className="w-full" size="lg">
        {saving ? <><Spinner/>Αποθήκευση...</> : "Αποθήκευση Ημερολογίου"}
      </Btn>
    </div>
  );
}

// ─── FOOD FREQUENCY ───────────────────────────────────────────────────────────
function FoodFreqTab({ token, date, initialData, onSave }) {
  const ws = weekStart(date);
  const [counts, setCounts] = useState(()=>{
    const m = {};
    if (initialData?.length) initialData.forEach(r=>{ m[r.category]=r.count; });
    return m;
  });
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  const setCount = (id,v) => setCounts(p=>({...p,[id]:v}));

  const save = async () => {
    setSaving(true);
    try {

  };

  return (
    <div className="space-y-4 fade-in">
      {toast && <Toast msg={toast} type={toast.includes("Σφάλμα")?"error":"success"} onClose={()=>setToast(null)} />}

      <Card className="p-4">
        <p className="text-sm font-semibold text-gray-700 mb-0.5">Εβδομαδιαία Συχνότητα Τροφίμων</p>
        <p className="text-xs text-gray-400">Εβδομάδα: {fmtDate(ws)}</p>
      </Card>

      <Card className="divide-y divide-gray-50">
        {FOOD_FREQ_CATS.map(cat=>(
          <div key={cat.id} className="px-4 py-3.5">
            <div className="flex justify-between items-start mb-2">
              <div>
                <p className="text-sm font-medium text-gray-700">{cat.label}</p>
                <p className="text-xs text-gray-400">{cat.hint}</p>
              </div>
              <span className="text-lg font-bold text-violet-600 ml-2">{counts[cat.id]||"0"}</span>
            </div>
            <div className="flex gap-1.5">
              {FREQ_OPTIONS.map(v=>(
                <button key={v} onClick={()=>setCount(cat.id,v)}
                  className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-colors
                    ${(counts[cat.id]||"0")===v?"bg-violet-600 text-white":"bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
                  {v}
                </button>
              ))}
            </div>

        ))}
      </Card>

      <Btn onClick={save} disabled={saving} className="w-full" size="lg">

  );
}

function ClientApp({ token, name }) {
  const [date, setDate] = useState(today());
  const [tab, setTab] = useState("habits");
  const [loading, setLoading] = useState(false);
  const [data, setData] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [coachNotes, setCoachNotes] = useState([]);
  const [hasUnread, setHasUnread] = useState(false);
  const [showBanner, setShowBanner] = useState(false);

  const LAST_SEEN_KEY = "ht_coach_notes_seen_" + token;

  const loadCoachNotes = useCallback(async () => {
    try {
      const result = await api("getCoachNotes", { token });
      const notes = result?.notes || [];
      setCoachNotes(notes);
      if (notes.length > 0) {
        const lastSeen = localStorage.getItem(LAST_SEEN_KEY) || "";
        const latest = notes.reduce((a,b)=> (b.savedAt||"") > (a.savedAt||"") ? b : a, notes[0]);
        if ((latest.savedAt||"") > lastSeen) {
          setHasUnread(true);
          setShowBanner(true);
        }
      }
    } catch(e) { console.error("coach notes:", e); }
  }, [token]);

  const load = useCallback(async () => {
    setLoading(true);
    try { setData(await api("getClientData", { token, date })); }
    catch(e) { console.error(e); }
    setLoading(false);
  }, [token, date]);

  useEffect(()=>{ load(); }, [load]);
  useEffect(()=>{ loadCoachNotes(); }, [loadCoachNotes]);

  const openCoachTab = () => {
    setTab("coach");
    setHasUnread(false);
    setShowBanner(false);
    if (coachNotes.length > 0) {
      const latest = coachNotes.reduce((a,b)=> (b.savedAt||"") > (a.savedAt||"") ? b : a, coachNotes[0]);
      localStorage.setItem(LAST_SEEN_KEY, latest.savedAt||"");
    }
  };

  const prevDay = () => {
    const d = new Date(date); d.setDate(d.getDate()-1);
    setDate(d.toISOString().split("T")[0]);
  };
  const nextDay = () => {
    const d = new Date(date); d.setDate(d.getDate()+1);
    if (d <= new Date()) setDate(d.toISOString().split("T")[0]);
  };

  const tabs = [
    { id:"habits", label:"Habits",    icon:"✅" },
    { id:"food",   label:"Φαγητό",   icon:"🍽" },
    { id:"freq",   label:"Εβδομάδα", icon:"📊" },
    { id:"notes",  label:"Σκέψεις",  icon:"💬" },
    { id:"coach",  label:"Coach",     icon:"💌", unread: hasUnread, onClick: openCoachTab },
  ];

  if (showSettings) return (
    <div className="min-h-screen bg-slate-50">
      <div className="max-w-lg mx-auto px-4 py-4">
        <SettingsView onBack={()=>setShowSettings(false)} />
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-lg">🌿</span>
            <div>
              <p className="text-sm font-bold text-gray-800 leading-tight">{name}</p>
              <p className="text-xs text-gray-400 leading-tight">Health Tracker</p>
            </div>
          </div>
          <button onClick={()=>setShowSettings(true)} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:bg-gray-100 rounded-full">⚙</button>
        </div>
      </header>

      {/* Coach notification banner */}
      {showBanner && (
        <div className="bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white px-4 py-3 flex items-center justify-between gap-3 shadow-md">
          <div className="flex items-center gap-2 flex-1">
            <span className="text-lg">💌</span>
            <p className="text-sm font-medium">Έχεις νέο μήνυμα από την Coach σου!</p>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <button onClick={openCoachTab} className="text-xs font-bold bg-white text-violet-600 px-3 py-1 rounded-full">Δες το</button>
            <button onClick={()=>setShowBanner(false)} className="text-white/70 hover:text-white text-lg leading-none">×</button>
          </div>
        </div>
      )}

      <div className="max-w-lg mx-auto px-4 py-4 space-y-4">
        {/* Date nav — hidden on coach tab */}
        {tab !== "coach" && (
          <div className="flex items-center justify-between bg-white rounded-2xl border border-gray-100 shadow-sm px-4 py-3">
            <button onClick={prevDay} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 text-lg">‹</button>
            <div className="text-center">
              <p className="text-sm font-bold text-gray-800">{fmtDate(date)}</p>
              {date===today()&&<p className="text-xs text-violet-500 font-medium">Σήμερα</p>}
            </div>
            <button onClick={nextDay} disabled={date===today()} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 text-lg disabled:opacity-30">›</button>
          </div>
        )}

        {/* Tabs */}
        <div className="flex bg-white rounded-xl border border-gray-100 shadow-sm p-1 gap-0.5">
          {tabs.map(t=>(
            <button key={t.id} onClick={t.onClick || (()=>setTab(t.id))}
              className={`flex-1 flex flex-col items-center py-2 rounded-lg text-xs font-medium transition-colors relative
                ${tab===t.id?"bg-violet-600 text-white":"text-gray-500 hover:bg-gray-50"}`}>
              <span className="text-base leading-none mb-0.5 relative">
                {t.icon}
                {t.unread && <span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border border-white" />}
              </span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>

        {/* Content */}
        {tab === "coach" ? (
          <CoachNotesTab notes={coachNotes} />
        ) : loading ? (
          <div className="flex justify-center py-12"><Spinner /></div>
        ) : (
          <>
            {tab==="habits" && <HabitTab token={token} date={date} initialData={data?.habits} onSave={load} />}
            {tab==="food"   && <FoodLogTab token={token} date={date} initialData={data?.foodLog} onSave={load} />}
            {tab==="freq"   && <FoodFreqTab token={token} date={date} initialData={data?.foodFreq} onSave={load} />}
            {tab==="notes"  && <FeedbackTab token={token} date={date} initialData={data?.feedback} onSave={load} />}
          </>
        )}

        <div className="h-6" />
      </div>
    </div>
  );
}

function ClientHistoryView({ client, password, onBack }) {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("habits");
  const [error, setError] = useState("");
  const [noteDate, setNoteDate] = useState(today());
  const [noteText, setNoteText] = useState("");
  const [savingNote, setSavingNote] = useState(false);
  const [noteToast, setNoteToast] = useState(null);

  const load = async () => {
    try {
      const d = await api("getClientHistory", { coachPassword:password, clientId:client.clientId });
      setData(d);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  useEffect(()=>{ load(); }, []);

  const habitsGrouped = useMemo(()=>{
    const g = {};
    (data?.habits||[]).forEach(h=>{ if(!g[h.date])g[h.date]=[]; g[h.date].push(h); });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  },[data]);

  const foodGrouped = useMemo(()=>{
    const g = {};
    (data?.foodLog||[]).forEach(e=>{ if(!g[e.date])g[e.date]=[]; g[e.date].push(e); });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  },[data]);

  const coachNotesGrouped = useMemo(()=>{
    return [...(data?.coachNotes||[])].sort((a,b)=>b.date?.localeCompare(a.date));
  },[data]);

  // Prefill note when switching date
  useEffect(()=>{
    const existing = (data?.coachNotes||[]).find(n=>n.date===noteDate);
    setNoteText(existing?.note||"");
  },[noteDate, data]);

  const saveNote = async () => {
    if (!noteText.trim()) return;
    setSavingNote(true);
    try {
      await api("saveCoachNote", { coachPassword:password, clientId:client.clientId, date:noteDate, note:noteText }, "POST");
      setNoteToast("✓ Το σχόλιο αποθηκεύτηκε!");
      load();
    } catch(e) { setNoteToast("Σφάλμα: "+e.message); }
    setSavingNote(false);
  };

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;
  if (error) return <p className="text-red-500 text-sm p-4">{error}</p>;

  return (
    <div className="space-y-4 fade-in">
      {noteToast && <Toast msg={noteToast} type={noteToast.includes("Σφάλμα")?"error":"success"} onClose={()=>setNoteToast(null)} />}

      <div className="flex items-center gap-3">
        <button onClick={onBack} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">←</button>
        <div>
          <h2 className="font-bold text-gray-800">{client.name}</h2>
          <p className="text-xs text-gray-400">token: {client.token}</p>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 bg-gray-100 p-1 rounded-xl overflow-x-auto">
        {[["habits","Habits"],["food","Φαγητό"],["freq","Εβδομάδα"],["feedback","Σκέψεις"],["coachnotes","✍️ Σχόλιά μου"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} className={`flex-shrink-0 flex-1 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap ${tab===v?"bg-white text-violet-700 shadow":"text-gray-500"}`}>{l}</button>
        ))}
      </div>

      {tab==="habits" && (
        <div className="space-y-3">
          {habitsGrouped.length===0&&<p className="text-sm text-gray-400 text-center py-8">Δεν υπάρχουν δεδομένα</p>}
          {habitsGrouped.map(([date,habits])=>{
            const done = habits.filter(h=>h.done==="TRUE"||h.done===true).length;
            const pct = habits.length ? Math.round(done/habits.length*100) : 0;
            return (
              <Card key={date} className="p-4">
                <div className="flex justify-between items-center mb-2">
                  <p className="text-sm font-semibold text-gray-700">{fmtDate(date)}</p>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${pct===100?"bg-emerald-100 text-emerald-700":pct>=60?"bg-violet-100 text-violet-700":"bg-gray-100 text-gray-500"}`}>{done}/{habits.length}</span>
                </div>
                <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden mb-2">
                  <div className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-full" style={{width:`${pct}%`}} />
                </div>
                <div className="space-y-1">
                  {habits.map((h,i)=>(
                    <div key={i} className="flex items-center gap-2">
                      <span className={`text-xs ${(h.done==="TRUE"||h.done===true)?"text-emerald-500":"text-gray-300"}`}>{(h.done==="TRUE"||h.done===true)?"✓":"○"}</span>
                      <p className={`text-xs ${(h.done==="TRUE"||h.done===true)?"text-gray-600":"text-gray-400"}`}>{h.habit}</p>
                    </div>
                  ))}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {tab==="food" && (
        <div className="space-y-3">
          {foodGrouped.length===0&&<p className="text-sm text-gray-400 text-center py-8">Δεν υπάρχουν δεδομένα</p>}
          {foodGrouped.map(([date,entries])=>(
            <Card key={date} className="p-4">

              {entries.map((e,i)=>(
                <div key={i} className="border-b border-gray-50 last:border-0 pb-3 last:pb-0 mb-3 last:mb-0">

      {tab==="freq" && (

          {(data?.foodFreq||[]).length===0&&<p className="text-sm text-gray-400 text-center py-8">Δεν υπάρχουν δεδομένα</p>}

          <p className="text-xs text-gray-400 font-medium px-1">Προηγούμενα σχόλια</p>

  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);
  const [toast, setToast] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  const loadClients = useCallback(async () => {
    setLoading(true);
    try {
      const data = await api("getAllClients", { coachPassword:password });
      setClients(Array.isArray(data)?data:[]);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, [password]);

  useEffect(()=>{ loadClients(); }, [loadClients]);

  const addClient = async () => {
    if (!newName.trim()) return;
    setAdding(true);
    try {
      const d = await api("addClient", { coachPassword:password, name:newName.trim() }, "POST");
      setToast(`✓ Πελάτης προστέθηκε! Token: ${d.token}`);
      setNewName(""); setShowAdd(false);
      loadClients();
    } catch(e) { setToast("Σφάλμα: "+e.message); }
    setAdding(false);
  };

  const logout = () => { ls.del(STORAGE.COACH); window.location.reload(); };

  if (showSettings) return (
    <div className="min-h-screen bg-slate-50">
      <div className="max-w-2xl mx-auto px-4 py-4">
        <SettingsView onBack={()=>setShowSettings(false)} />
      </div>
    </div>
  );

  if (selected) return (
    <div className="min-h-screen bg-slate-50">
      <div className="max-w-2xl mx-auto px-4 py-4">
        <ClientHistoryView client={selected} password={password} onBack={()=>setSelected(null)} />
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50">
      {toast && <Toast msg={toast} type={toast.includes("Σφάλμα")?"error":"success"} onClose={()=>setToast(null)} />}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-lg">🌿</span>
            <div>
              <p className="text-sm font-bold text-gray-800">Coach Dashboard</p>
              <p className="text-xs text-gray-400">Let's Thrive for Life</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setShowSettings(true)} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:bg-gray-100 rounded-full">⚙</button>
            <button onClick={logout} className="text-xs text-gray-400 border border-gray-200 rounded-lg px-2 py-1 hover:bg-gray-50">Έξοδος</button>
          </div>
        </div>
      </header>

      <div className="max-w-2xl mx-auto px-4 py-4 space-y-4">

        {/* Stats */}
        <div className="grid grid-cols-2 gap-3">
          <Card className="p-4 text-center">
            <p className="text-2xl font-bold text-violet-600">{clients.length}</p>
            <p className="text-xs text-gray-400 mt-0.5">Ενεργοί Πελάτες</p>
          </Card>
          <Card className="p-4 flex items-center justify-center">
            <Btn onClick={()=>setShowAdd(p=>!p)} size="sm">+ Νέος Πελάτης</Btn>
          </Card>
        </div>

        {/* Add client form */}
        {showAdd && (
          <Card className="p-4 space-y-3 fade-in">
            <p className="text-sm font-semibold text-gray-700">Προσθήκη Πελάτη</p>
            <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addClient()}
              placeholder="Όνομα πελάτη" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
            <div className="flex gap-2">
              <Btn onClick={addClient} disabled={adding||!newName.trim()} className="flex-1">
                {adding?<Spinner/>:"Δημιουργία"}
              </Btn>
              <Btn onClick={()=>setShowAdd(false)} variant="outline">Ακύρωση</Btn>
            </div>
            <p className="text-xs text-gray-400">Μετά τη δημιουργία θα εμφανιστεί το μοναδικό token — αντέγραψέ το και στείλτο στον πελάτη.</p>
          </Card>
        )}

        {/* Client list */}
        <Card className="divide-y divide-gray-50">
          <div className="px-4 py-3 flex justify-between items-center">
            <p className="text-sm font-semibold text-gray-700">Πελάτες</p>
            <button onClick={loadClients} className="text-xs text-violet-500 hover:text-violet-700">↻ Ανανέωση</button>
          </div>
          {loading ? (
            <div className="flex justify-center py-8"><Spinner /></div>
          ) : error ? (
            <p className="text-sm text-red-500 px-4 py-4">{error}</p>
          ) : clients.length===0 ? (
            <p className="text-sm text-gray-400 text-center py-8">Δεν υπάρχουν πελάτες ακόμα</p>
          ) : clients.map(c=>(
            <button key={c.clientId} onClick={()=>setSelected(c)}
              className="w-full flex items-center gap-4 px-4 py-3.5 hover:bg-gray-50 text-left transition-colors">
              <div className="w-9 h-9 rounded-full bg-violet-100 flex items-center justify-center text-sm font-bold text-violet-600 flex-shrink-0">
                {c.name?.[0]?.toUpperCase()||"?"}
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-gray-800">{c.name}</p>
                <p className="text-xs text-gray-400 truncate">token: {c.token}</p>
              </div>
              <span className="text-gray-300">›</span>
            </button>
          ))}
        </Card>

        <div className="h-6" />
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(()=>{
    const token = ls.get(STORAGE.TOKEN);
    const name  = ls.get(STORAGE.NAME);
    const coach = ls.get(STORAGE.COACH);
    if (token && name) return { type:"client", token, name };
    if (coach) return { type:"coach", password:coach };
    return null;
  });

  if (!session) return <LoginView onLogin={setSession} />;
  if (session.type==="coach") return <CoachApp password={session.password} />;
  return <ClientApp token={session.token} name={session.name} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
